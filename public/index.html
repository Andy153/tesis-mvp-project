<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trazá — MVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />

<!-- PDF.js (via unpkg legacy build) -->
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<!-- Tesseract.js (OCR) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>

<div id="root"></div>

<!-- Modules -->
<script src="nomenclador_data.js"></script>
<script src="analyzer.js"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="upload_view.jsx"></script>
<script type="text/babel" src="errors_view.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [active, setActive] = React.useState('upload');
  const [files, setFiles] = React.useState([]);
  const [selectedFileId, setSelectedFileId] = React.useState(null);

  function upsertFile(entry) {
    setFiles(prev => {
      const idx = prev.findIndex(f => f.id === entry.id);
      if (idx === -1) return [entry, ...prev];
      const copy = [...prev];
      copy[idx] = entry;
      return copy;
    });
    // Auto-seleccionar cuando termina de analizarse
    if (entry.status === 'analyzed') {
      setSelectedFileId(entry.id);
    }
  }

  function removeFile(id) {
    setFiles(prev => prev.filter(f => f.id !== id));
    if (selectedFileId === id) setSelectedFileId(null);
  }

  function openFile(id) {
    setActive('upload');
    setSelectedFileId(id);
    setTimeout(() => {
      const el = document.querySelector('.analysis-detail');
      if (el) window.scrollTo({ top: el.offsetTop - 24, behavior: 'smooth' });
    }, 100);
  }

  // Contador de errores críticos para badge sidebar
  const errorCount = files.reduce((acc, f) => {
    if (!f.analysis) return acc;
    return acc + f.analysis.summary.error;
  }, 0);

  return (
    <div className="app">
      <window.Sidebar active={active} setActive={setActive} errorCount={errorCount} />
      <main className="main">
        {active === 'upload' && (
          <window.UploadView
            files={files}
            onAddFile={upsertFile}
            onRemoveFile={removeFile}
            onSelectFile={setSelectedFileId}
            selectedFileId={selectedFileId}
          />
        )}
        {active === 'errors' && (
          <window.ErrorsView files={files} onOpenFile={openFile} />
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
